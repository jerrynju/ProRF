<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProRF · 语义缩放 · 复杂网络拓扑</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: radial-gradient(ellipse 80% 60% at 50% 20%, #0D1830 0%, #04060F 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, 'PingFang SC', 'SF Pro Text', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 0; height: 0; }
@keyframes fadeUp { from { transform:translateY(5px) } to { transform:translateY(0) } }
@keyframes popIn  { from { opacity:0; transform:scale(.92) } to { opacity:1; transform:scale(1) } }
@keyframes pulse  { 0%,100%{opacity:.9} 50%{opacity:.45} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ━━━━ THEME ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const T = {
  bg:'#060B18', bg2:'#0C1426', bg3:'#0A1020',
  surf:'#121E34', surf2:'#1A2A46', surf3:'#22345A',
  prim:'#3DD8F0', onPrim:'#031018',
  sec:'#F0B840',
  txt1:'#E0EEF8', txt2:'#8AACCC', txt3:'#4A6888', txt4:'#2A3C58',
  line:'#1A2A46', line2:'#0E1A30',
  ok:'#44D86A', warn:'#F0B840', err:'#FF5555',
  sh1:'0 2px 8px rgba(0,0,0,.5)',
  sh2:'0 4px 20px rgba(0,0,0,.7)',
  sh3:'0 8px 40px rgba(0,0,0,.85)',
};

const KC = {
  TX:   { c:'#44AAFF', label:'TX' },
  AMP:  { c:'#FFA040', label:'AMP' },
  ANT:  { c:'#BB80FF', label:'ANT' },
  PATH: { c:'#3DD8F0', label:'PATH' },
  RX:   { c:'#44D86A', label:'RX' },
  COUP: { c:'#20DCC0', label:'COUP' },
  COMB: { c:'#F0B840', label:'COMB' },
  MEAS: { c:'#4FD1A5', label:'MEAS' },
};

/* ━━━━ DATA MODEL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const NODES = [
  { id:'tx', kind:'TX', icon:'◎', name:'发射机',
    out:'+23.0', unit:'dBm', delta:null,
    params:[{l:'发射功率',v:'+23.0 dBm'},{l:'工作频率',v:'2.4 GHz'},{l:'调制方式',v:'OFDM/64-QAM'},{l:'相位噪声',v:'−120 dBc/Hz'},{l:'发射效率',v:'38%'}]},
  { id:'pa', kind:'AMP', icon:'⚡', name:'功率放大器',
    out:'+43.0', unit:'dBm', delta:'+20.0 dB',
    params:[{l:'增益',v:'+20.0 dB'},{l:'噪声系数',v:'5.2 dB'},{l:'P1dB',v:'+44 dBm'},{l:'OIP3',v:'+55 dBm'},{l:'工作电压',v:'5 V'}]},
  { id:'coupler', kind:'COUP', icon:'⊕', name:'定向耦合器',
    out:'+43.0', unit:'dBm', delta:null, multiPort:true,
    ports:[
      {id:'through', label:'透传端', delta:'−0.5 dB', toId:'ant-tx', isMain:true},
      {id:'coupled', label:'耦合端', delta:'−20 dB',  toId:'detector', isMain:false},
    ],
    params:[{l:'耦合度',v:'−20 dB'},{l:'插入损耗',v:'−0.5 dB'},{l:'方向性',v:'30 dB'},{l:'隔离度',v:'25 dB'},{l:'工作频率',v:'2.4 GHz'}]},
  { id:'ant-tx', kind:'ANT', icon:'△', name:'发射天线',
    out:'+57.0', unit:'EIRP', delta:'−0.5 dB',
    params:[{l:'天线增益',v:'+14.5 dBi'},{l:'天线类型',v:'八木天线'},{l:'VSWR',v:'1.4'},{l:'3 dB 波束宽',v:'30°'},{l:'极化',v:'水平'}]},
  { id:'detector', kind:'MEAS', icon:'◉', name:'功率检测器',
    out:'+23.0', unit:'dBm', delta:'−20 dB', branch:true,
    params:[{l:'检测功率',v:'+23.0 dBm'},{l:'动态范围',v:'50 dB'},{l:'频率范围',v:'0.1–6 GHz'},{l:'响应时间',v:'1 ns'},{l:'用途',v:'TX 功率监测'}]},
  { id:'path', kind:'PATH', icon:'◈', name:'自由空间传播',
    out:'−43.0', unit:'dBm', delta:'−100 dB',
    params:[{l:'路径损耗',v:'−100.0 dB'},{l:'传播距离',v:'1.0 km'},{l:'传播模型',v:'Friis 自由空间'},{l:'大气损耗',v:'0.01 dB/km'},{l:'余量',v:'+17 dB'}]},
  { id:'ant-rx', kind:'ANT', icon:'▽', name:'接收天线',
    out:'−28.5', unit:'dBm', delta:'+14.5 dBi',
    params:[{l:'天线增益',v:'+14.5 dBi'},{l:'天线类型',v:'八木天线'},{l:'VSWR',v:'1.4'},{l:'3 dB 波束宽',v:'30°'}]},
  { id:'lna', kind:'AMP', icon:'⚡', name:'LNA 低噪放',
    out:'−10.5', unit:'dBm', delta:'+18.0 dB',
    params:[{l:'增益',v:'+18.0 dB'},{l:'噪声系数',v:'0.8 dB'},{l:'IIP3',v:'+5 dBm'},{l:'工作电流',v:'18 mA'}]},
  { id:'aux-tx', kind:'TX', icon:'◉', name:'辅助 TX 源',
    out:'+20.0', unit:'dBm', delta:null, branch:true,
    params:[{l:'输出功率',v:'+20.0 dBm'},{l:'工作频率',v:'2.4 GHz'},{l:'用途',v:'本振注入/校准'},{l:'相位',v:'可调 0–360°'}]},
  { id:'combiner', kind:'COMB', icon:'⊗', name:'合路器',
    out:'−7.2', unit:'dBm', delta:null, multiPort:true,
    ports:[
      {id:'in1', label:'主路径 (LNA)',   delta:'−10.5 dBm', fromId:'lna',    isMain:true},
      {id:'in2', label:'辅助输入 (Aux)', delta:'+20.0 dBm', fromId:'aux-tx', isMain:false},
    ],
    params:[{l:'输出功率',v:'−7.2 dBm'},{l:'合成增益',v:'+3.3 dB'},{l:'插入损耗',v:'−0.5 dB'},{l:'隔离度',v:'25 dB'},{l:'工作频率',v:'2.4 GHz'}]},
  { id:'rx', kind:'RX', icon:'◎', name:'接收机',
    out:'−60.0', unit:'dBm sens.', delta:'链路余量 +52.8 dB',
    params:[{l:'接收灵敏度',v:'−60.0 dBm'},{l:'可用链路余量',v:'+52.8 dB'},{l:'接收带宽',v:'20 MHz'},{l:'最小 SNR',v:'10 dB'},{l:'解调方式',v:'OFDM'}]},
];

/* explicit edge graph */
const EDGES = [
  {from:'tx',      to:'pa',       label:null,      type:'main'},
  {from:'pa',      to:'coupler',  label:null,      type:'main'},
  {from:'coupler', to:'ant-tx',   label:'−0.5 dB', type:'main',   port:'through'},
  {from:'coupler', to:'detector', label:'−20 dB',  type:'branch', port:'coupled'},
  {from:'ant-tx',  to:'path',     label:null,      type:'main'},
  {from:'path',    to:'ant-rx',   label:null,      type:'main'},
  {from:'ant-rx',  to:'lna',      label:null,      type:'main'},
  {from:'lna',     to:'combiner', label:null,      type:'main',   port:'in1'},
  {from:'aux-tx',  to:'combiner', label:'+20 dBm', type:'branch', port:'in2'},
  {from:'combiner',to:'rx',       label:null,      type:'main'},
];

/* main chain for flow view */
const MAIN_PATH = ['tx','pa','coupler','ant-tx','path','ant-rx','lna','combiner','rx'];

/* helpers */
const byId   = id => NODES.find(n => n.id === id);
const edgesFrom = id => EDGES.filter(e => e.from === id);
const edgesTo   = id => EDGES.filter(e => e.to   === id);

/* ━━━━ CANVAS LAYOUT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const NH  = 52;
const CW  = 365;
const ML  = 12,  MW = 148; /* main lane */
const BL  = 208, BW = 108; /* branch lane */
const MCX = ML + MW / 2;   /* = 86 */
const BCX = BL + BW / 2;   /* = 262 */

const CPOS = {
  'tx':       {x:ML, y:20,  w:MW},
  'pa':       {x:ML, y:112, w:MW},
  'coupler':  {x:ML, y:204, w:MW},
  'ant-tx':   {x:ML, y:308, w:MW},
  'path':     {x:ML, y:400, w:MW},
  'ant-rx':   {x:ML, y:492, w:MW},
  'lna':      {x:ML, y:584, w:MW},
  'combiner': {x:ML, y:692, w:MW},
  'rx':       {x:ML, y:784, w:MW},
  'detector': {x:BL, y:198, w:BW},
  'aux-tx':   {x:BL, y:600, w:BW},
};
const CANVAS_H = 784 + NH + 28;

/* compute edge port positions */
function edgePorts(e) {
  const fp = CPOS[e.from], tp = CPOS[e.to];
  const fcx = fp.x + fp.w/2, tcx = tp.x + tp.w/2;
  let x1, y1, x2, y2;
  /* from-port */
  if (e.from === 'coupler' && e.port === 'coupled') {
    x1 = fp.x + fp.w; y1 = fp.y + NH / 2; /* right edge center */
  } else {
    x1 = fcx; y1 = fp.y + NH + 6; /* bottom center */
  }
  /* to-port */
  if (e.to === 'combiner') {
    x2 = e.port === 'in2' ? tp.x + tp.w * 0.65 : tp.x + tp.w * 0.28;
    y2 = tp.y;
  } else {
    x2 = tcx; y2 = tp.y - 6; /* top center */
  }
  const my = (y1 + y2) / 2;
  const mx = (x1 + x2) / 2;
  return {x1, y1, x2, y2, my, mx};
}

/* ━━━━ STATUS BAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function StatusBar() {
  return (
    <div style={{height:28, background:T.bg3, display:'flex', alignItems:'center',
      justifyContent:'space-between', padding:'0 18px', flexShrink:0,
      borderBottom:`1px solid ${T.line2}`}}>
      <span style={{fontSize:12, fontWeight:700, color:T.txt2,
        fontFamily:"'SF Mono','Courier New',monospace"}}>9:41</span>
      <div style={{display:'flex', alignItems:'center', gap:6}}>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="none">
          {[3,6,9,12].map((h,i) => (
            <rect key={i} x={i*3.8} y={11-h} width="3" height={h} rx="1"
              fill={i<3?T.txt2:T.txt4} opacity={i<3?.8:.4}/>
          ))}
        </svg>
        <svg width="24" height="11" viewBox="0 0 24 11">
          <rect x=".5" y=".5" width="20" height="10" rx="2.5" stroke={T.txt2} strokeWidth="1" opacity=".5"/>
          <rect x="1.5" y="1.5" width="16" height="8" rx="1.5" fill={T.ok}/>
          <rect x="21.5" y="3.5" width="2" height="4" rx="1" fill={T.txt2} opacity=".4"/>
        </svg>
      </div>
    </div>
  );
}

/* ━━━━ APP BAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function ZoomPill({zoom, setZoom}) {
  return (
    <div style={{display:'flex', background:T.surf, borderRadius:8, padding:2, gap:1}}>
      {[['canvas','拓扑'],['flow','流程'],['detail','详情']].map(([z,l]) => {
        const act = zoom === z;
        return (
          <button key={z} onClick={() => setZoom(z)} style={{
            padding:'4px 10px', borderRadius:6, border:'none',
            background:act?T.prim:'transparent', color:act?T.onPrim:T.txt3,
            fontSize:11, fontWeight:act?700:500, cursor:'pointer', fontFamily:'inherit',
            transition:'all 160ms',
          }}>{l}</button>
        );
      })}
    </div>
  );
}

function AppBar({zoom, setZoom, canGoBack, onBack}) {
  return (
    <div style={{height:52, background:T.bg3, display:'flex', alignItems:'center',
      padding:'0 14px', gap:10, flexShrink:0, borderBottom:`1px solid ${T.line}`}}>
      {canGoBack ? (
        <button onClick={onBack} style={{width:32, height:32, borderRadius:8, border:'none',
          background:T.surf, color:T.txt2, cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:18, flexShrink:0}}>‹</button>
      ) : (
        <div style={{width:32, height:32, borderRadius:8, background:T.surf,
          display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="6" height="4" rx="1.5" fill={T.prim} opacity=".9"/>
            <rect x="9" y="3" width="6" height="4" rx="1.5" fill={T.prim} opacity=".5"/>
            <rect x="1" y="9" width="6" height="4" rx="1.5" fill={T.prim} opacity=".5"/>
            <rect x="9" y="9" width="6" height="4" rx="1.5" fill={T.prim} opacity=".3"/>
          </svg>
        </div>
      )}
      <div style={{flex:1}}>
        <div style={{fontSize:14, fontWeight:700, color:T.txt1, lineHeight:1.2}}>RF 链路预算</div>
        <div style={{fontSize:10, color:T.txt3, lineHeight:1}}>2.4 GHz · 1 km · 11 节点 · DAG</div>
      </div>
      <ZoomPill zoom={zoom} setZoom={setZoom}/>
      <button style={{width:32, height:32, borderRadius:8, border:'none',
        background:T.surf, color:T.txt2, cursor:'pointer',
        display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:19, flexShrink:0}}>⊕</button>
    </div>
  );
}

/* ━━━━ VIEW 1 · CANVAS (拓扑视图) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function PortPopup({fromNode, onClose, onConnect}) {
  const targets = NODES.filter(n => n.id !== fromNode.id).slice(0, 4);
  return (
    <div onClick={onClose} style={{position:'absolute', inset:0, zIndex:100,
      display:'flex', alignItems:'center', justifyContent:'center'}}>
      <div onClick={e => e.stopPropagation()} style={{
        background:T.surf2, border:`1px solid ${T.surf3}`,
        borderRadius:12, overflow:'hidden', width:196,
        boxShadow:T.sh3, animation:'popIn 160ms ease',
      }}>
        <div style={{padding:'10px 14px 8px', borderBottom:`1px solid ${T.line}`}}>
          <div style={{fontSize:9, fontWeight:800, color:T.txt3, textTransform:'uppercase', letterSpacing:.6}}>连接端口</div>
          <div style={{fontSize:12, fontWeight:700, color:KC[fromNode.kind].c, marginTop:2}}>
            {fromNode.icon} {fromNode.name}
          </div>
        </div>
        {targets.map(t => (
          <button key={t.id} onClick={() => {onConnect(t.id); onClose();}} style={{
            width:'100%', display:'flex', alignItems:'center', gap:8,
            padding:'9px 14px', background:'none', border:'none',
            borderBottom:`1px solid ${T.line2}`, cursor:'pointer',
          }} onMouseEnter={e => e.currentTarget.style.background=T.surf3}
             onMouseLeave={e => e.currentTarget.style.background='transparent'}>
            <div style={{width:6, height:6, borderRadius:'50%', background:KC[t.kind].c, flexShrink:0}}/>
            <span style={{fontSize:12, color:T.txt2, flex:1, textAlign:'left'}}>{t.name}</span>
            <span style={{fontSize:10, fontFamily:'monospace', color:KC[t.kind].c}}>{t.out}</span>
          </button>
        ))}
        <button style={{width:'100%', padding:'9px 14px', background:'none', border:'none',
          cursor:'pointer', fontSize:12, color:T.prim, textAlign:'left'}}>＋ 新建节点</button>
      </div>
    </div>
  );
}

function CanvasChip({node, selected, onTap, onPortTap}) {
  const pos = CPOS[node.id];
  const kc  = KC[node.kind];
  const [hov, setHov] = useState(false);
  const isActive = selected || hov;
  const isBranch = !!node.branch;

  return (
    <div style={{position:'absolute', left:pos.x, top:pos.y, width:pos.w, height:NH}}>
      {/* Top port dot */}
      <div onClick={e => {e.stopPropagation(); onPortTap(node,'in');}}
        style={{position:'absolute', top:-6, left:'50%', transform:'translateX(-50%)',
          width:10, height:10, borderRadius:'50%', zIndex:5, cursor:'pointer',
          background:'#243A58', border:`1.5px solid #3A5270`,
          transition:'all 150ms'}}
        onMouseEnter={e => {e.currentTarget.style.background=kc.c; e.currentTarget.style.borderColor=kc.c;}}
        onMouseLeave={e => {e.currentTarget.style.background='#243A58'; e.currentTarget.style.borderColor='#3A5270';}}
      />

      {/* Card */}
      <div onClick={() => onTap(node.id)}
        onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
        style={{
          width:'100%', height:'100%', borderRadius:9,
          background: isActive ? `linear-gradient(135deg,${kc.c}26,${kc.c}0C)` : '#1C2A44',
          border:`1.5px solid ${isActive ? kc.c : kc.c+'60'}`,
          boxShadow: isActive
            ? `0 0 0 2px ${kc.c}30, 0 4px 18px rgba(0,0,0,.65), 0 0 14px ${kc.c}1A`
            : '0 2px 8px rgba(0,0,0,.55)',
          cursor:'pointer', userSelect:'none', overflow:'hidden',
          display:'flex', flexDirection:'column', transition:'all 180ms',
          opacity: isBranch ? .9 : 1,
        }}>
        <div style={{height:3, background:`linear-gradient(90deg,${kc.c},${kc.c}55)`, flexShrink:0}}/>
        <div style={{flex:1, display:'flex', alignItems:'center', gap:pos.w<130?5:7, padding:`0 ${pos.w<130?7:9}px`}}>
          {/* Icon */}
          <div style={{width:pos.w<130?20:24, height:pos.w<130?20:24, borderRadius:6,
            background:`${kc.c}22`, border:`1px solid ${kc.c}38`,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:pos.w<130?11:12, flexShrink:0, color:kc.c}}>{node.icon}</div>
          {/* Text */}
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:7, fontWeight:800, color:kc.c, textTransform:'uppercase',
              letterSpacing:.5, lineHeight:1, marginBottom:2}}>{node.kind}</div>
            <div style={{fontSize:pos.w<130?9:10, fontWeight:600, color:'#C8DCF0',
              overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{node.name}</div>
          </div>
          {/* Value */}
          {pos.w >= 130 && (
            <div style={{textAlign:'right', flexShrink:0}}>
              <div style={{fontSize:12, fontWeight:800, color:kc.c,
                fontFamily:"'SF Mono','Courier New',monospace", lineHeight:1,
                textShadow:`0 0 10px ${kc.c}55`}}>{node.out}</div>
              <div style={{fontSize:7, color:'#4A6888', lineHeight:1.3}}>{node.unit}</div>
            </div>
          )}
          {/* Multi-port badge */}
          {node.multiPort && (
            <div style={{flexShrink:0, fontSize:9, fontWeight:800, color:kc.c,
              background:`${kc.c}20`, borderRadius:4, padding:'1px 4px',
              border:`1px solid ${kc.c}30`}}>
              {node.ports.length}P
            </div>
          )}
        </div>
      </div>

      {/* Bottom port dot */}
      <div onClick={e => {e.stopPropagation(); onPortTap(node,'out');}}
        style={{position:'absolute', bottom:-6, left:'50%', transform:'translateX(-50%)',
          width:10, height:10, borderRadius:'50%', zIndex:5, cursor:'pointer',
          background:'#243A58', border:`1.5px solid #3A5270`, transition:'all 150ms'}}
        onMouseEnter={e => {e.currentTarget.style.background=kc.c; e.currentTarget.style.borderColor=kc.c;}}
        onMouseLeave={e => {e.currentTarget.style.background='#243A58'; e.currentTarget.style.borderColor='#3A5270';}}
      />
    </div>
  );
}

function CanvasView({selectedId, onNodeTap}) {
  const [popup, setPopup] = useState(null);

  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden',
      position:'relative', background:'#070D1C'}}>

      {/* Scrollable area */}
      <div style={{flex:1, overflowY:'auto', overflowX:'hidden',
        WebkitOverflowScrolling:'touch',
        backgroundImage:'radial-gradient(circle, #1C2E48 1px, transparent 1px)',
        backgroundSize:'22px 22px'}}>

        <div style={{position:'relative', width:CW, minHeight:CANVAS_H, margin:'0 auto'}}>

          {/* Lane divider */}
          <svg style={{position:'absolute', top:0, left:0, width:CW, height:CANVAS_H,
            pointerEvents:'none', overflow:'visible'}}>

            {/* Faint lane separator */}
            <line x1={BL-6} y1={170} x2={BL-6} y2={CANVAS_H-20}
              stroke="#1A2A40" strokeWidth="1" strokeDasharray="3 4"/>

            {/* Lane labels */}
            <text x={MCX} y={14} textAnchor="middle" fontSize="8" fill="#2A3C58" fontWeight="700" letterSpacing="0.5">主路径</text>
            <text x={BCX} y={14} textAnchor="middle" fontSize="8" fill="#2A3C58" fontWeight="700" letterSpacing="0.5">分支</text>

            {/* EDGES */}
            {EDGES.map(e => {
              const {x1,y1,x2,y2,my,mx} = edgePorts(e);
              const col   = KC[byId(e.from).kind].c;
              const isBr  = e.type === 'branch';
              const isGain = e.label?.startsWith('+');
              const isLoss = e.label?.startsWith('−') || e.label?.startsWith('-');
              const lblCol = isGain ? '#44D86A' : isLoss ? '#FF8060' : T.prim;
              const d = `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;

              return (
                <g key={`${e.from}-${e.to}`}>
                  {/* glow */}
                  <path d={d} fill="none" stroke={col} strokeWidth="3.5" opacity=".08"/>
                  {/* line */}
                  <path d={d} fill="none" stroke={col}
                    strokeWidth={isBr ? 1.2 : 1.6} opacity={isBr ? .5 : .7}
                    strokeDasharray={isBr ? '5 3' : '4 3'}/>
                  {/* arrow */}
                  <circle cx={x2} cy={y2} r="3" fill={col} opacity={isBr?.6:.85}/>
                  {/* label */}
                  {e.label && (
                    <>
                      <rect x={mx-24} y={my-10} width={48} height={20} rx={10}
                        fill="#0A1422" stroke={lblCol} strokeWidth="1" opacity=".92"/>
                      <text x={mx} y={my+5} textAnchor="middle"
                        fontSize="8.5" fontWeight="800" fill={lblCol}
                        fontFamily="'SF Mono','Courier New',monospace">{e.label}</text>
                    </>
                  )}
                </g>
              );
            })}

            {/* Branch terminal badges */}
            {[byId('detector'), byId('aux-tx')].map(n => {
              const p = CPOS[n.id];
              const cx = p.x + p.w/2;
              const termY = n.id === 'detector' ? p.y - 14 : p.y + NH + 14;
              return (
                <g key={n.id}>
                  <rect x={cx-22} y={termY-7} width={44} height={14} rx={7}
                    fill="none" stroke={KC[n.kind].c} strokeWidth="1" opacity=".3"
                    strokeDasharray="2 2"/>
                  <text x={cx} y={termY+4} textAnchor="middle" fontSize="7"
                    fill={KC[n.kind].c} opacity=".5" fontWeight="700">
                    {n.id === 'detector' ? '← tap' : 'inject →'}
                  </text>
                </g>
              );
            })}
          </svg>

          {/* Node chips */}
          {NODES.map(n => (
            <CanvasChip key={n.id} node={n}
              selected={n.id === selectedId}
              onTap={onNodeTap}
              onPortTap={(nd, pt) => setPopup({node:nd, port:pt})}
            />
          ))}
        </div>
      </div>

      {/* Hint bar */}
      <div style={{flexShrink:0, padding:'7px 14px',
        background:'rgba(7,13,28,.96)', borderTop:'1px solid #1A2A46',
        display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div style={{display:'flex', alignItems:'center', gap:6}}>
          <div style={{width:6, height:6, borderRadius:'50%', background:T.prim,
            animation:'pulse 2s ease infinite'}}/>
          <span style={{fontSize:10, color:T.txt3}}>
            11 节点 · 2 分叉 · 1 合路 · DAG
          </span>
        </div>
        <span style={{fontSize:10, color:T.txt4}}>点击节点 → 流程视图</span>
      </div>

      {popup && (
        <PortPopup fromNode={popup.node}
          onClose={() => setPopup(null)}
          onConnect={() => setPopup(null)}
        />
      )}
    </div>
  );
}

/* ━━━━ VIEW 2 · FLOW (流程视图) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function FlowConnector({fromNode, edgeLabel, nodeLabel}) {
  const kc = KC[fromNode.kind];
  const delta = edgeLabel || nodeLabel;
  const isGain = delta?.startsWith('+');
  const isLoss = delta?.startsWith('−') || delta?.startsWith('-');
  return (
    <div style={{display:'flex', alignItems:'center', padding:'0 16px', height:42, gap:10, flexShrink:0}}>
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:2, flexShrink:0}}>
        <div style={{width:1.5, height:8, background:T.line}}/>
        <div style={{width:0, height:0, borderLeft:'4px solid transparent',
          borderRight:'4px solid transparent', borderTop:`5px solid ${T.line}`}}/>
      </div>
      {delta && (
        <div style={{
          padding:'3px 8px', borderRadius:6,
          background: isGain?'rgba(68,216,106,.1)':isLoss?'rgba(255,112,112,.1)':T.surf,
          border:`1px solid ${isGain?'#44D86A44':isLoss?'#FF707044':T.line}`,
          fontSize:10, fontWeight:700, fontFamily:"'SF Mono','Courier New',monospace",
          color: isGain?T.ok:isLoss?T.err:T.txt3, letterSpacing:.3, whiteSpace:'nowrap',
        }}>{delta}</div>
      )}
      <div style={{flex:1, height:1, background:`${kc.c}18`}}/>
      <div style={{fontSize:10, color:kc.c, fontFamily:"'SF Mono','Courier New',monospace",
        fontWeight:700, whiteSpace:'nowrap'}}>{fromNode.out}</div>
    </div>
  );
}

function FlowCard({node, selected, onTap, indent}) {
  const kc  = KC[node.kind];
  const [hov, setHov] = useState(false);
  return (
    <div onClick={() => onTap(node.id)}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        margin: indent ? '0 12px 0 28px' : '0 12px',
        borderRadius:11,
        background: selected ? `${kc.c}12` : T.surf,
        border:`1.5px solid ${selected?kc.c:hov?kc.c+'44':T.line}`,
        boxShadow: selected?`0 0 0 2px ${kc.c}20,${T.sh2}`:hov?T.sh1:'none',
        cursor:'pointer', transition:'all 150ms', overflow:'hidden', flexShrink:0,
      }}>
      <div style={{display:'flex', alignItems:'center', gap:10, padding:'11px 14px'}}>
        <div style={{width:3, height:34, borderRadius:2,
          background:`linear-gradient(180deg,${kc.c},${kc.c}44)`, flexShrink:0}}/>
        <div style={{width:30, height:30, borderRadius:8, background:`${kc.c}18`,
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, flexShrink:0}}>
          {node.icon}
        </div>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:2}}>
            <span style={{fontSize:8, fontWeight:800, color:kc.c, textTransform:'uppercase',
              letterSpacing:.6, padding:'1px 5px', borderRadius:4,
              background:`${kc.c}18`, border:`1px solid ${kc.c}28`}}>{node.kind}</span>
            {node.branch && (
              <span style={{fontSize:8, color:T.txt4}}>分支</span>
            )}
          </div>
          <div style={{fontSize:13, fontWeight:600, color:T.txt1,
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{node.name}</div>
        </div>
        <div style={{textAlign:'right', flexShrink:0}}>
          <div style={{fontSize:15, fontWeight:800, color:kc.c,
            fontFamily:"'SF Mono','Courier New',monospace", letterSpacing:-.4}}>{node.out}</div>
          <div style={{fontSize:9, color:T.txt4, lineHeight:1.2}}>{node.unit}</div>
        </div>
        <div style={{color:T.txt4, fontSize:14, flexShrink:0}}>›</div>
      </div>
    </div>
  );
}

function MultiPortCard({node, expanded, onToggle, onTap, onBranchTap}) {
  const kc = KC[node.kind];
  const [hov, setHov] = useState(false);
  const isOutput = node.ports[0].toId;  /* coupler outputs, combiner inputs */

  return (
    <div style={{margin:'0 12px', flexShrink:0}}>
      <div style={{
        borderRadius:11, background:T.surf,
        border:`1.5px solid ${kc.c}66`,
        boxShadow: hov ? T.sh1 : 'none',
        overflow:'hidden', transition:'box-shadow 150ms',
      }}>
        {/* Header */}
        <div onClick={() => onTap(node.id)}
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{display:'flex', alignItems:'center', gap:10, padding:'11px 14px',
            cursor:'pointer', borderBottom:`1px solid ${T.line}`}}>
          <div style={{width:3, height:34, borderRadius:2,
            background:`linear-gradient(180deg,${kc.c},${kc.c}44)`, flexShrink:0}}/>
          <div style={{width:30, height:30, borderRadius:8, background:`${kc.c}18`,
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, flexShrink:0}}>
            {node.icon}
          </div>
          <div style={{flex:1, minWidth:0}}>
            <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:2}}>
              <span style={{fontSize:8, fontWeight:800, color:kc.c, textTransform:'uppercase',
                letterSpacing:.6, padding:'1px 5px', borderRadius:4,
                background:`${kc.c}18`, border:`1px solid ${kc.c}28`}}>{node.kind}</span>
              <span style={{fontSize:9, color:T.txt3, fontWeight:600}}>
                {isOutput ? `${node.ports.length} 输出` : `${node.ports.length} 输入`}
              </span>
            </div>
            <div style={{fontSize:13, fontWeight:600, color:T.txt1}}>{node.name}</div>
          </div>
          <div style={{textAlign:'right', flexShrink:0}}>
            <div style={{fontSize:15, fontWeight:800, color:kc.c,
              fontFamily:"'SF Mono','Courier New',monospace"}}>{node.out}</div>
            <div style={{fontSize:9, color:T.txt4}}>{node.unit}</div>
          </div>
          <div style={{color:T.txt4, fontSize:14, flexShrink:0}}>›</div>
        </div>

        {/* Port rows */}
        {node.ports.map((port, i) => {
          const connId = port.toId || port.fromId;
          const conn   = byId(connId);
          const connKc = conn ? KC[conn.kind] : null;
          const isGain = port.delta?.startsWith('+');
          const isLoss = port.delta?.startsWith('−') || port.delta?.startsWith('-');
          const dCol   = isGain ? T.ok : isLoss ? T.err : T.prim;
          const isOpen = expanded[port.id];

          return (
            <div key={port.id}>
              <button onClick={() => onToggle(port.id)} style={{
                width:'100%', display:'flex', alignItems:'center', gap:8,
                padding:'8px 14px 8px 10px', background:'none', border:'none',
                borderBottom: isOpen || i < node.ports.length-1 ? `1px solid ${T.line2}` : 'none',
                cursor:'pointer', textAlign:'left',
              }}
                onMouseEnter={e => e.currentTarget.style.background=T.surf2}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                {/* Port color strip */}
                <div style={{width:3, height:22, borderRadius:2, flexShrink:0,
                  background: port.isMain ? kc.c : `${kc.c}55`}}/>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:10, fontWeight:700,
                    color: port.isMain ? T.txt2 : T.txt3}}>{port.label}</div>
                  {conn && (
                    <div style={{fontSize:9, color:T.txt4}}>
                      {isOutput ? '→ ' : '← '}{conn.name}
                    </div>
                  )}
                </div>
                <div style={{fontSize:10, fontWeight:700, fontFamily:'monospace',
                  color:dCol, flexShrink:0}}>{port.delta}</div>
                {connKc && (
                  <div style={{width:6, height:6, borderRadius:'50%',
                    background:connKc.c, flexShrink:0, marginLeft:4}}/>
                )}
                <div style={{fontSize:11, color:T.txt4, marginLeft:4, flexShrink:0}}>
                  {isOpen ? '▾' : '›'}
                </div>
              </button>

              {/* Expanded branch node */}
              {isOpen && conn && (
                <div style={{padding:'8px 12px 10px 20px', background:T.bg2}}>
                  <FlowCard node={conn} selected={false} onTap={onBranchTap} indent={false}/>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FlowView({selectedId, onCardTap}) {
  const [portExp, setPortExp] = useState({});
  const togglePort = id => setPortExp(e => ({...e, [id]: !e[id]}));

  return (
    <div style={{flex:1, overflowY:'auto', background:T.bg,
      WebkitOverflowScrolling:'touch', paddingBottom:12}}>

      {/* Summary strip */}
      <div style={{margin:'12px 12px 4px', padding:'10px 14px', borderRadius:10,
        background:T.surf2, border:`1px solid ${T.line}`,
        display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <div style={{fontSize:11, color:T.txt3}}>
          <span style={{color:T.txt2, fontWeight:600}}>链路分析</span>
          <span style={{marginLeft:6, fontSize:10, padding:'1px 5px', borderRadius:5,
            background:'rgba(61,216,240,.12)', color:T.prim, fontWeight:700}}>DAG</span>
        </div>
        <div style={{display:'flex', gap:12}}>
          {[{l:'EIRP', v:'+57.0', u:'dBm'},{l:'余量', v:'+52.8', u:'dB'}].map(x => (
            <div key={x.l} style={{textAlign:'right'}}>
              <div style={{fontSize:12, fontWeight:800, color:T.prim,
                fontFamily:"'SF Mono','Courier New',monospace"}}>{x.v}
                <span style={{fontSize:9, color:T.txt4, marginLeft:2}}>{x.u}</span>
              </div>
              <div style={{fontSize:9, color:T.txt4}}>{x.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Main path */}
      {MAIN_PATH.map((id, i) => {
        const node    = byId(id);
        const prevId  = i > 0 ? MAIN_PATH[i-1] : null;
        const prevNode = prevId ? byId(prevId) : null;
        const edge    = prevId ? EDGES.find(e => e.from===prevId && e.to===id) : null;

        return (
          <React.Fragment key={id}>
            {prevNode && (
              <FlowConnector
                fromNode={prevNode}
                edgeLabel={edge?.label}
                nodeLabel={node.delta}
              />
            )}
            {node.multiPort ? (
              <MultiPortCard
                node={node}
                expanded={portExp}
                onToggle={togglePort}
                onTap={onCardTap}
                onBranchTap={onCardTap}
              />
            ) : (
              <FlowCard node={node} selected={node.id===selectedId} onTap={onCardTap}/>
            )}
          </React.Fragment>
        );
      })}

      {/* Result strip */}
      <div style={{margin:'12px 12px 0', padding:'10px 14px', borderRadius:10,
        background:'rgba(68,216,106,.06)', border:'1px solid rgba(68,216,106,.2)',
        display:'flex', alignItems:'center', gap:10}}>
        <div style={{width:8, height:8, borderRadius:'50%', background:T.ok, flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:12, fontWeight:700, color:T.ok}}>链路预算通过</div>
          <div style={{fontSize:10, color:T.txt3}}>余量 +52.8 dB · 含耦合监测 + 合路注入</div>
        </div>
        <div style={{fontSize:18, color:T.ok}}>✓</div>
      </div>
    </div>
  );
}

/* ━━━━ VIEW 3 · DETAIL (详情视图) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function MiniNodeCard({node, dim, label, onClick}) {
  const kc = KC[node.kind];
  return (
    <div onClick={onClick} style={{
      padding:'8px 12px', borderRadius:8, background:T.surf2,
      border:`1px solid ${kc.c}33`, cursor:'pointer',
      display:'flex', alignItems:'center', gap:8,
      opacity: dim?.5:1, transition:'all 150ms',
    }}
      onMouseEnter={e => {if(!dim) e.currentTarget.style.borderColor=kc.c}}
      onMouseLeave={e => {e.currentTarget.style.borderColor=`${kc.c}33`}}>
      <div style={{width:22, height:22, borderRadius:6, background:`${kc.c}18`,
        display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, flexShrink:0, color:kc.c}}>
        {node.icon}
      </div>
      <div style={{flex:1, minWidth:0}}>
        {label && <div style={{fontSize:8, color:T.txt4, marginBottom:1}}>{label}</div>}
        <div style={{fontSize:11, fontWeight:600, color:T.txt1,
          whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{node.name}</div>
      </div>
      <div style={{fontSize:11, fontWeight:700, color:kc.c,
        fontFamily:"'SF Mono','Courier New',monospace"}}>{node.out}</div>
      <div style={{fontSize:13, color:T.txt4}}>›</div>
    </div>
  );
}

function DetailView({nodeId, onNavigate}) {
  const node  = byId(nodeId);
  const kc    = KC[node.kind];
  const ins   = edgesTo(nodeId);
  const outs  = edgesFrom(nodeId);
  const [pathOpen, setPathOpen] = useState(true);

  return (
    <div style={{flex:1, overflowY:'auto', background:T.bg,
      WebkitOverflowScrolling:'touch', animation:'fadeUp 200ms ease'}}>

      {/* Hero header */}
      <div style={{
        margin:'12px 12px 0', borderRadius:14, overflow:'hidden',
        background:`linear-gradient(135deg,${kc.c}18,${kc.c}06)`,
        border:`1.5px solid ${kc.c}44`, padding:'16px 16px 12px',
      }}>
        <div style={{display:'flex', alignItems:'flex-start', gap:12}}>
          <div style={{width:46, height:46, borderRadius:13, background:`${kc.c}22`,
            border:`1.5px solid ${kc.c}44`, display:'flex', alignItems:'center',
            justifyContent:'center', fontSize:22, flexShrink:0}}>{node.icon}</div>
          <div style={{flex:1}}>
            <div style={{display:'flex', alignItems:'center', gap:7, marginBottom:4, flexWrap:'wrap', gap:5}}>
              <span style={{fontSize:9, fontWeight:800, color:kc.c,

                padding:'2px 6px', borderRadius:5,
                background:`${kc.c}1A`, border:`1px solid ${kc.c}33`}}>{node.kind}</span>
              {node.multiPort && (
                <span style={{fontSize:9, fontWeight:700, color:T.prim,

                  background:'rgba(61,216,240,.12)', border:'1px solid rgba(61,216,240,.25)'}}>
                  {node.ports.length} 端口
                </span>

              {node.branch && (
                <span style={{fontSize:9, color:T.txt4, padding:'2px 6px',
                  borderRadius:5, background:T.surf2}}>分支节点</span>
              )}
            </div>
            <div style={{fontSize:17, fontWeight:700, color:T.txt1, lineHeight:1.2}}>{node.name}</div>
          </div>
        </div>
        <div style={{marginTop:12, padding:'9px 14px', borderRadius:10,
          background:`${T.bg3}CC`, border:`1px solid ${T.line}`,
          display:'flex', alignItems:'baseline', gap:8}}>
          <span style={{fontSize:11, color:T.txt3, flex:1}}>

          <span style={{fontSize:24, fontWeight:800, color:kc.c, letterSpacing:-1,
            fontFamily:"'SF Mono','Courier New',monospace"}}>{node.out}</span>
          <span style={{fontSize:11, color:T.txt4}}>{node.unit}</span>
        </div>
        {node.delta && (
          <div style={{marginTop:7, display:'flex', alignItems:'center', gap:6}}>
            <div style={{width:4, height:4, borderRadius:'50%', background:kc.c, opacity:.6}}/>
            <span style={{fontSize:11, color:kc.c, fontFamily:"'SF Mono','Courier New',monospace",
              fontWeight:700}}>{node.delta}</span>
          </div>
        )}
      </div>

      {/* Parameters */}
      <div style={{margin:'14px 12px 0'}}>
        <div style={{fontSize:10, fontWeight:800, color:T.txt3, textTransform:'uppercase',
          letterSpacing:.7, marginBottom:8}}>参数</div>
        <div style={{borderRadius:10, overflow:'hidden', border:`1px solid ${T.line}`}}>
          {node.params.map((p,i) => (
            <div key={p.l} style={{display:'flex', alignItems:'center', padding:'10px 14px',
              background: i%2===0?T.surf:T.surf2,
              borderBottom: i<node.params.length-1?`1px solid ${T.line2}`:'none'}}>
              <span style={{flex:1, fontSize:12, color:T.txt3}}>{p.l}</span>
              <span style={{fontSize:12, fontWeight:700, color:T.txt1,
                fontFamily:"'SF Mono','Courier New',monospace"}}>{p.v}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Port list for multi-port nodes */}
      {node.multiPort && (
        <div style={{margin:'14px 12px 0'}}>
          <div style={{fontSize:10, fontWeight:800, color:T.txt3, textTransform:'uppercase',
            letterSpacing:.7, marginBottom:8}}>端口连接</div>
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {node.ports.map(port => {
              const connId  = port.toId || port.fromId;
              const conn    = byId(connId);
              const connKc  = conn ? KC[conn.kind] : null;
              const isGain  = port.delta?.startsWith('+');
              const isLoss  = port.delta?.startsWith('−') || port.delta?.startsWith('-');
              const dCol    = isGain?T.ok:isLoss?T.err:T.prim;
              return (
                <div key={port.id} style={{padding:'10px 12px', borderRadius:10,
                  background:T.surf2, border:`1px solid ${port.isMain?kc.c+'44':T.line}`}}>
                  <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                    <div style={{width:4, height:4, borderRadius:'50%',
                      background:port.isMain?kc.c:`${kc.c}55`}}/>
                    <span style={{fontSize:11, fontWeight:700, color:port.isMain?T.txt2:T.txt3,
                      flex:1}}>{port.label}</span>
                    <span style={{fontSize:11, fontWeight:800, color:dCol,
                      fontFamily:"'SF Mono','Courier New',monospace"}}>{port.delta}</span>
                  </div>
                  {conn && (
                    <MiniNodeCard node={conn} onClick={() => onNavigate(conn.id)}
                      label={port.toId ? '→ 连接至' : '← 来自'}/>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Signal path */}
      <div style={{margin:'14px 12px 0'}}>
        <button onClick={() => setPathOpen(o => !o)} style={{
          width:'100%', display:'flex', alignItems:'center', gap:8, background:'none',
          border:'none', cursor:'pointer', padding:0, marginBottom:8, textAlign:'left'}}>
          <span style={{fontSize:10, fontWeight:800, color:T.txt3, textTransform:'uppercase',
            letterSpacing:.7, flex:1}}>信号路径</span>
          <span style={{fontSize:12, color:T.txt3, display:'inline-block',
            transform:pathOpen?'rotate(90deg)':'', transition:'transform 200ms'}}>›</span>
        </button>

        {pathOpen && (
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {/* Inputs */}
            {ins.length === 0 ? (
              <div style={{padding:'8px 12px', borderRadius:8, border:`1px dashed ${T.line}`,
                fontSize:11, color:T.txt4, textAlign:'center'}}>信号源起点</div>
            ) : (
              <>
                {ins.map(e => {
                  const from = byId(e.from);
                  return <MiniNodeCard key={e.from} node={from}
                    label={e.port ? `${e.port} ← ` : '← 上一节点'}
                    onClick={() => onNavigate(e.from)}/>;
                })}
                <div style={{display:'flex', alignItems:'center', gap:8, padding:'2px 14px'}}>
                  <div style={{width:1.5, height:14, background:T.line, marginLeft:11}}/>
                  <span style={{fontSize:10, color:T.txt4, fontFamily:'monospace'}}>
                    {node.delta || (ins.length > 1 ? '合路' : '→')}
                  </span>
                </div>
              </>
            )}

            {/* Current */}
            <div style={{padding:'10px 14px', borderRadius:10,
              background:`${kc.c}14`, border:`2px solid ${kc.c}`,
              display:'flex', alignItems:'center', gap:8}}>
              <div style={{width:8, height:8, borderRadius:'50%', background:kc.c,
                animation:'pulse 1.8s ease infinite', flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:9, color:kc.c, fontWeight:800, textTransform:'uppercase', letterSpacing:.5}}>当前节点</div>
                <div style={{fontSize:13, fontWeight:700, color:T.txt1}}>{node.name}</div>
              </div>
              <div style={{fontSize:14, fontWeight:800, color:kc.c,
                fontFamily:"'SF Mono','Courier New',monospace"}}>{node.out}</div>
            </div>

            {/* Outputs */}
            {outs.length === 0 ? (
              <div>
                <div style={{width:1.5, height:12, background:T.line, margin:'4px 0 0 23px'}}/>
                <div style={{padding:'8px 12px', borderRadius:8, border:`1px dashed ${T.line}`,
                  fontSize:11, color:T.txt4, textAlign:'center'}}>信号链路末端</div>
              </div>
            ) : (
              <>
                <div style={{display:'flex', alignItems:'center', gap:8, padding:'2px 14px'}}>
                  <div style={{width:1.5, height:14, background:T.line, marginLeft:11}}/>
                  <span style={{fontSize:10, color:T.txt4, fontFamily:'monospace'}}>
                    {outs.length > 1 ? '分路' : '→'}
                  </span>
                </div>
                {outs.map(e => {
                  const to = byId(e.to);
                  return <MiniNodeCard key={e.to} node={to}
                    label={e.port ? `port: ${e.port}` : '→ 下一节点'}
                    onClick={() => onNavigate(e.to)}/>;
                })}
              </>
            )}
          </div>
        )}
      </div>

      {/* Actions */}
      <div style={{margin:'16px 12px 20px', display:'flex', gap:8}}>
        {[{l:'编辑参数', c:T.prim},{l:'添加节点', c:T.sec}].map(a => (
          <button key={a.l} style={{flex:1, padding:'10px 0', borderRadius:9, border:'none',
            background:`${a.c}1A`, color:a.c, fontSize:12, fontWeight:700,
            cursor:'pointer', fontFamily:'inherit', transition:'background 150ms'}}
            onMouseEnter={e => e.currentTarget.style.background=`${a.c}28`}
            onMouseLeave={e => e.currentTarget.style.background=`${a.c}1A`}>{a.l}</button>
        ))}
      </div>
    </div>
  );
}

/* ━━━━ BOTTOM NAV ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function BottomNav({active, onNav}) {
  const items = [
    {id:'home',icon:'⌂',label:'首页'},
    {id:'editor',icon:'⊞',label:'编辑'},
    {id:'results',icon:'◉',label:'结果'},
    {id:'market',icon:'◈',label:'市场'},
  ];
  return (
    <div style={{height:52, background:T.bg3, display:'flex', alignItems:'center',
      flexShrink:0, borderTop:`1px solid ${T.line}`}}>
      {items.map(item => {
        const act = active === item.id;
        return (
          <button key={item.id} onClick={() => onNav(item.id)} style={{
            flex:1, height:'100%', display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center', gap:3,
            border:'none', background:'none', cursor:'pointer', fontFamily:'inherit'}}>
            <span style={{fontSize:18, lineHeight:1, color:act?T.prim:T.txt4, transition:'color 150ms'}}>{item.icon}</span>
            <span style={{fontSize:9, fontWeight:act?700:500, color:act?T.prim:T.txt4, letterSpacing:.2}}>{item.label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ━━━━ APP ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function ProRFApp() {
  const [zoom,    setZoom]    = useState('canvas');
  const [selId,   setSelId]   = useState('tx');
  const [animKey, setAnimKey] = useState(0);
  const [nav,     setNav]     = useState('editor');

  const navigate = useCallback((newZoom, nodeId) => {
    if (nodeId) setSelId(nodeId);
    setZoom(newZoom);
    setAnimKey(k => k+1);
  }, []);

  return (
    <div style={{width:'100%', height:'100%', display:'flex', flexDirection:'column',
      background:T.bg, overflow:'hidden'}}>
      <StatusBar/>
      <AppBar
        zoom={zoom} setZoom={z => navigate(z)}
        canGoBack={zoom !== 'canvas'}
        onBack={() => navigate(zoom==='detail'?'flow':'canvas')}
      />
      <div key={animKey} style={{flex:1, display:'flex', flexDirection:'column',
        overflow:'hidden', animation:'fadeUp 200ms ease'}}>
        {zoom === 'canvas' && <CanvasView selectedId={selId} onNodeTap={id => navigate('flow', id)}/>}
        {zoom === 'flow'   && <FlowView  selectedId={selId} onCardTap={id => navigate('detail', id)}/>}
        {zoom === 'detail' && <DetailView nodeId={selId} onNavigate={id => navigate('detail', id)}/>}
      </div>
      <BottomNav active={nav} onNav={setNav}/>
      <div style={{height:20, background:T.bg, display:'flex', alignItems:'center',
        justifyContent:'center', flexShrink:0}}>
        <div style={{width:108, height:4, borderRadius:2, background:T.txt2, opacity:.2}}/>
      </div>
    </div>
  );
}

/* ━━━━ ROOT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const PHONE_W = 390, PHONE_H = 762, LABEL_H = 40;

function Root() {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    function recalc() {
      const s = Math.min(1, (window.innerWidth-32)/PHONE_W, (window.innerHeight-16)/(PHONE_H+LABEL_H));
      setScale(parseFloat(s.toFixed(4)));
    }
    recalc();
    window.addEventListener('resize', recalc);
    return () => window.removeEventListener('resize', recalc);
  }, []);

  return (
    <div style={{width:PHONE_W*scale, height:(PHONE_H+LABEL_H)*scale,
      display:'flex', flexDirection:'column', alignItems:'center'}}>
      <div style={{transform:`scale(${scale})`, transformOrigin:'top center',
        width:PHONE_W, display:'flex', flexDirection:'column', alignItems:'center', gap:10}}>

        <div style={{display:'flex', alignItems:'center', gap:14, height:LABEL_H}}>
          <div style={{fontSize:11, fontWeight:800, color:'rgba(255,255,255,.28)',
            textTransform:'uppercase', letterSpacing:1.2}}>ProRF · 语义缩放</div>
          <div style={{height:1, width:30, background:'rgba(255,255,255,.1)'}}/>
          <div style={{fontSize:10, color:'rgba(255,255,255,.2)'}}>DAG 网络拓扑验证</div>
        </div>

        <div style={{width:PHONE_W, height:PHONE_H, borderRadius:50,
          background:'#0C1020', border:'10px solid #181E2E',
          boxShadow:'0 50px 120px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.05), inset 0 1px 0 rgba(255,255,255,.08)',
          overflow:'hidden', position:'relative', flexShrink:0}}>
          <div style={{position:'absolute', top:0, left:'50%', transform:'translateX(-50%)',
            width:120, height:28, background:'#0C1020', borderRadius:'0 0 20px 20px',
            zIndex:100, display:'flex', alignItems:'center', justifyContent:'center', gap:8}}>
            <div style={{width:10, height:10, borderRadius:'50%', background:'#1A2038',
              border:'1px solid #252840', display:'flex', alignItems:'center', justifyContent:'center'}}>
              <div style={{width:4, height:4, borderRadius:'50%', background:'#0A1020'}}/>
            </div>
            <div style={{width:34, height:8, borderRadius:4, background:'#1A2038', border:'1px solid #252840'}}/>
          </div>
          <ProRFApp/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
